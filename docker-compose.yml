services:
  postgres:
    image: postgres:16
    container_name: petshop_snowflake
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: petshop_db
    ports:
      - "5433:5433"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./data:/data
      - ./init:/docker-entrypoint-initdb.d

volumes:
  postgres_data:
